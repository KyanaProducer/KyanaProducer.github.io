<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ラップ計測ツール</title>
<style>
  :root{
    --bg:#0f1216;
    --panel:#171c23;
    --panel2:#1e242d;
    --line:#2a323d;
    --ink:#e8edf2;
    --sub:#8b98a7;
    --accent:#4ec9b0;
    --accent2:#e0af68;
    --run:#e05252;
    --run-bg:#2a1a1a;
    --font:'Segoe UI',system-ui,-apple-system,'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;
    --mono:'SFMono-Regular',Consolas,'Roboto Mono',monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;background:var(--bg);color:var(--ink);
    font-family:var(--font);font-size:14px;
    padding:16px;
  }
  h1{font-size:18px;margin:0 0 14px;font-weight:600;letter-spacing:.02em;}
  h1 span{color:var(--accent);}

  /* stats */
  .stats{
    display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
    margin-bottom:16px;
  }
  .stat{
    background:var(--panel);border:1px solid var(--line);border-radius:8px;
    padding:10px 12px;
  }
  .stat .label{font-size:11px;color:var(--sub);margin-bottom:4px;letter-spacing:.05em;}
  .stat .val{font-family:var(--mono);font-size:18px;font-weight:600;}
  .stat .note{font-size:11px;color:var(--accent2);margin-top:2px;min-height:14px;}

  .toolbar{
    display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;
  }
  button{
    font-family:var(--font);cursor:pointer;border-radius:6px;border:1px solid var(--line);
    background:var(--panel2);color:var(--ink);padding:6px 12px;font-size:13px;
  }
  button:hover{border-color:var(--accent);}
  .toolbar button.danger:hover{border-color:var(--run);}
  .hint{font-size:11px;color:var(--sub);margin-left:auto;}

  /* table */
  .wrap{border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .thead,.row{
    display:grid;
    grid-template-columns:56px 150px 150px 96px 108px 108px 1fr;
    align-items:center;
  }
  .thead{
    background:var(--panel2);border-bottom:1px solid var(--line);
    font-size:11px;color:var(--sub);letter-spacing:.05em;position:sticky;top:0;z-index:2;
  }
  .thead>div{padding:8px 10px;}
  .scroll{max-height:70vh;overflow:auto;}
  .row{border-bottom:1px solid var(--line);}
  .row:nth-child(odd){background:var(--panel);}
  .row:nth-child(even){background:#141920;}
  .row.running{background:var(--run-bg);}
  .row>div{padding:5px 10px;}
  .idx{font-family:var(--mono);color:var(--sub);text-align:right;padding-right:14px;}

  .time-in{
    width:100%;font-family:var(--mono);font-size:15px;
    background:transparent;border:1px solid transparent;border-radius:5px;
    color:var(--ink);padding:5px 6px;
  }
  .time-in:hover{border-color:var(--line);}
  .time-in:focus{outline:none;border-color:var(--accent);background:#0c0f13;}
  .row.running .time-in{color:var(--run);font-weight:600;}

  .cnt{display:flex;align-items:center;gap:4px;}
  .cnt button{padding:2px 9px;font-size:15px;line-height:1;background:var(--panel);}
  .cnt input{
    width:52px;text-align:center;font-family:var(--mono);font-size:14px;
    background:#0c0f13;border:1px solid var(--line);border-radius:5px;color:var(--ink);padding:5px 2px;
  }
  .cnt input:focus{outline:none;border-color:var(--accent);}
  .cnt.sm{gap:3px;}
  .cnt.sm button{padding:2px 6px;font-size:13px;}
  .cnt.sm input{width:40px;}

  .act button{width:100%;padding:6px 4px;font-size:12px;font-weight:600;}
  .act button.go{color:var(--accent);border-color:#2f4f48;}
  .act button.stop{color:#fff;background:var(--run);border-color:var(--run);}

  @media(max-width:640px){
    .stats{grid-template-columns:1fr 1fr;}
    .thead,.row{grid-template-columns:40px 108px 116px 72px 92px 92px 1fr;}
  }
</style>
</head>
<body>
  <h1>ラップ計測ツール <span>／ チャンチャレ記録</span></h1>

  <div class="stats" id="stats">
    <div class="stat"><div class="label">平均時間（計測済のみ）</div><div class="val" id="s-avg">--</div><div class="note"></div></div>
    <div class="stat"><div class="label">最長時間</div><div class="val" id="s-max">--</div><div class="note" id="s-max-n"></div></div>
    <div class="stat"><div class="label">最短時間</div><div class="val" id="s-min">--</div><div class="note" id="s-min-n"></div></div>
    <div class="stat"><div class="label">チャンチャレ平均</div><div class="val" id="c-avg">--</div><div class="note"></div></div>
    <div class="stat"><div class="label">最多回数</div><div class="val" id="c-max">--</div><div class="note" id="c-max-n"></div></div>
    <div class="stat"><div class="label">最小回数</div><div class="val" id="c-min">--</div><div class="note" id="c-min-n"></div></div>
  </div>

  <div class="toolbar">
    <button id="export">CSVエクスポート</button>
    <button id="json-export">JSON書出</button>
    <button id="json-import">JSON読込</button>
    <input type="file" id="json-file" accept=".json,application/json" style="display:none">
    <button id="reset" class="danger">全リセット</button>
    <label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;">
      <input type="checkbox" id="lap-mode" checked style="width:15px;height:15px;accent-color:var(--accent);">
      ラップ連動（Stopで次を自動Start）
    </label>
    <span class="hint">時間入力は <b>mm:ss.SS</b>（例 01:23.45）／ Start押下で計測開始・Stopで確定</span>
  </div>

  <div class="wrap">
    <div class="thead">
      <div class="idx">回</div>
      <div>時間 (mm:ss.SS)</div>
      <div>チャンチャレ回数</div>
      <div>計測</div>
      <div>ロンコネ</div>
      <div>ジュニオール</div>
      <div></div>
    </div>
    <div class="scroll" id="rows"></div>
  </div>

<script>
const ROWS = 100;
const rows = document.getElementById('rows');

// state[i] = { ms:number|null, count:number, running:bool, startAt:number|null }
const state = Array.from({length:ROWS}, () => ({ms:null, count:0, running:false, startAt:null, ron:0, jun:0}));
let ticking = null;
let lapMode = true;

function fmt(ms){
  if(ms==null) return '';
  const m = Math.floor(ms/60000);
  const s = Math.floor((ms%60000)/1000);
  const cs = Math.floor((ms%1000)/10);
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'.'+String(cs).padStart(2,'0');
}
// parse "mm:ss.SS" or "ss.SS" or "sssss" -> ms | null
function parse(str){
  str = str.trim();
  if(str==='') return null;
  let m=0,s=0,cs=0;
  const colon = str.split(':');
  if(colon.length===2){
    m = parseInt(colon[0]||'0',10)||0;
    const rest = colon[1].split('.');
    s = parseInt(rest[0]||'0',10)||0;
    cs = rest[1]!==undefined ? parseInt((rest[1]+'00').slice(0,2),10)||0 : 0;
  } else {
    const rest = str.split('.');
    s = parseInt(rest[0]||'0',10)||0;
    cs = rest[1]!==undefined ? parseInt((rest[1]+'00').slice(0,2),10)||0 : 0;
  }
  return m*60000 + s*1000 + cs*10;
}

// build rows
const frag = document.createDocumentFragment();
for(let i=0;i<ROWS;i++){
  const row = document.createElement('div');
  row.className='row'; row.dataset.i=i;
  row.innerHTML = `
    <div class="idx">${i+1}</div>
    <div><input class="time-in" data-t="${i}" placeholder="mm:ss.SS" inputmode="decimal"></div>
    <div class="cnt">
      <button data-dec="${i}">◀</button>
      <input data-c="${i}" type="number" min="0" value="0">
      <button data-inc="${i}">▶</button>
    </div>
    <div class="act"><button class="go" data-btn="${i}">Start</button></div>
    <div class="cnt sm">
      <button data-rondec="${i}">◀</button>
      <input data-ron="${i}" type="number" min="0" value="0">
      <button data-roninc="${i}">▶</button>
    </div>
    <div class="cnt sm">
      <button data-jundec="${i}">◀</button>
      <input data-jun="${i}" type="number" min="0" value="0">
      <button data-juninc="${i}">▶</button>
    </div>
    <div></div>`;
  frag.appendChild(row);
}
rows.appendChild(frag);

// events (delegation)
rows.addEventListener('click', e=>{
  const t=e.target;
  if(t.dataset.inc!==undefined){ const i=+t.dataset.inc; state[i].count++; syncCount(i); recalc(); }
  else if(t.dataset.dec!==undefined){ const i=+t.dataset.dec; state[i].count=Math.max(0,state[i].count-1); syncCount(i); recalc(); }
  else if(t.dataset.roninc!==undefined){ const i=+t.dataset.roninc; state[i].ron++; syncRon(i); }
  else if(t.dataset.rondec!==undefined){ const i=+t.dataset.rondec; state[i].ron=Math.max(0,state[i].ron-1); syncRon(i); }
  else if(t.dataset.juninc!==undefined){ const i=+t.dataset.juninc; state[i].jun++; syncJun(i); }
  else if(t.dataset.jundec!==undefined){ const i=+t.dataset.jundec; state[i].jun=Math.max(0,state[i].jun-1); syncJun(i); }
  else if(t.dataset.btn!==undefined){ toggle(+t.dataset.btn); }
});
rows.addEventListener('input', e=>{
  const t=e.target;
  if(t.dataset.c!==undefined){ const i=+t.dataset.c; state[i].count=Math.max(0,parseInt(t.value||'0',10)||0); recalc(); }
  else if(t.dataset.ron!==undefined){ const i=+t.dataset.ron; state[i].ron=Math.max(0,parseInt(t.value||'0',10)||0); }
  else if(t.dataset.jun!==undefined){ const i=+t.dataset.jun; state[i].jun=Math.max(0,parseInt(t.value||'0',10)||0); }
});
rows.addEventListener('change', e=>{
  const t=e.target;
  if(t.dataset.t!==undefined){
    const i=+t.dataset.t;
    if(state[i].running) return; // ignore edits while running
    state[i].ms = parse(t.value);
    t.value = fmt(state[i].ms);
    recalc();
  }
});

function syncCount(i){
  rows.querySelector(`[data-c="${i}"]`).value = state[i].count;
}
function syncRon(i){ rows.querySelector(`[data-ron="${i}"]`).value = state[i].ron; }
function syncJun(i){ rows.querySelector(`[data-jun="${i}"]`).value = state[i].jun; }

function startRow(i){
  const st=state[i];
  if(st.running) return;
  const row=rows.querySelector(`.row[data-i="${i}"]`);
  const btn=rows.querySelector(`[data-btn="${i}"]`);
  const inp=rows.querySelector(`[data-t="${i}"]`);
  st.running=true; st.startAt=performance.now();
  row.classList.add('running');
  btn.textContent='Stop'; btn.classList.remove('go'); btn.classList.add('stop');
  inp.readOnly=true;
  ensureTick();
}

function stopRow(i){
  const st=state[i];
  if(!st.running) return;
  const row=rows.querySelector(`.row[data-i="${i}"]`);
  const btn=rows.querySelector(`[data-btn="${i}"]`);
  const inp=rows.querySelector(`[data-t="${i}"]`);
  st.ms=performance.now()-st.startAt;
  st.running=false; st.startAt=null;
  row.classList.remove('running');
  btn.textContent='Start'; btn.classList.remove('stop'); btn.classList.add('go');
  inp.readOnly=false; inp.value=fmt(st.ms);
  recalc();
}

function toggle(i){
  const st=state[i];
  if(!st.running){
    startRow(i);
  } else {
    stopRow(i);
    // lap mode: stopping row i immediately starts the next row
    if(lapMode && i+1<ROWS && !state[i+1].running && state[i+1].ms==null){
      startRow(i+1);
      const nextRow=rows.querySelector(`.row[data-i="${i+1}"]`);
      if(nextRow) nextRow.scrollIntoView({block:'nearest'});
    }
    maybeStopTick();
  }
}

function ensureTick(){
  if(ticking) return;
  ticking=setInterval(()=>{
    const now=performance.now();
    for(let i=0;i<ROWS;i++){
      if(state[i].running){
        rows.querySelector(`[data-t="${i}"]`).value = fmt(now-state[i].startAt);
      }
    }
  },33);
}
function maybeStopTick(){
  if(state.some(s=>s.running)) return;
  clearInterval(ticking); ticking=null;
}

function recalc(){
  // times: completed (not running) with ms!=null
  const times=[]; // {ms, n}
  for(let i=0;i<ROWS;i++){
    if(!state[i].running && state[i].ms!=null) times.push({ms:state[i].ms, n:i+1});
  }
  const avgEl=document.getElementById('s-avg');
  const maxEl=document.getElementById('s-max'), maxN=document.getElementById('s-max-n');
  const minEl=document.getElementById('s-min'), minN=document.getElementById('s-min-n');
  if(times.length){
    const sum=times.reduce((a,b)=>a+b.ms,0);
    avgEl.textContent=fmt(sum/times.length);
    const mx=times.reduce((a,b)=>b.ms>a.ms?b:a);
    const mn=times.reduce((a,b)=>b.ms<a.ms?b:a);
    maxEl.textContent=fmt(mx.ms); maxN.textContent=`${mx.n}回目`;
    minEl.textContent=fmt(mn.ms); minN.textContent=`${mn.n}回目`;
  } else {
    avgEl.textContent='--'; maxEl.textContent='--'; minEl.textContent='--'; maxN.textContent=''; minN.textContent='';
  }

  // counts: rows that have any data (time set OR count>0) — count all entered rows
  const counts=[];
  for(let i=0;i<ROWS;i++){
    const s=state[i];
    if((!s.running && s.ms!=null) || s.count>0) counts.push({c:s.count, n:i+1});
  }
  const cAvg=document.getElementById('c-avg');
  const cMax=document.getElementById('c-max'), cMaxN=document.getElementById('c-max-n');
  const cMin=document.getElementById('c-min'), cMinN=document.getElementById('c-min-n');
  if(counts.length){
    const sum=counts.reduce((a,b)=>a+b.c,0);
    cAvg.textContent=(sum/counts.length).toFixed(2);
    const mx=counts.reduce((a,b)=>b.c>a.c?b:a);
    const mn=counts.reduce((a,b)=>b.c<a.c?b:a);
    cMax.textContent=mx.c; cMaxN.textContent=`${mx.n}回目`;
    cMin.textContent=mn.c; cMinN.textContent=`${mn.n}回目`;
  } else {
    cAvg.textContent='--'; cMax.textContent='--'; cMin.textContent='--'; cMaxN.textContent=''; cMinN.textContent='';
  }
}

document.getElementById('reset').addEventListener('click', ()=>{
  if(!confirm('全ての行をリセットします。よろしいですか？')) return;
  clearInterval(ticking); ticking=null;
  for(let i=0;i<ROWS;i++){
    state[i]={ms:null,count:0,running:false,startAt:null,ron:0,jun:0};
    const row=rows.querySelector(`.row[data-i="${i}"]`);
    row.classList.remove('running');
    row.querySelector(`[data-t="${i}"]`).value=''; row.querySelector(`[data-t="${i}"]`).readOnly=false;
    row.querySelector(`[data-c="${i}"]`).value=0;
    row.querySelector(`[data-ron="${i}"]`).value=0;
    row.querySelector(`[data-jun="${i}"]`).value=0;
    const b=row.querySelector(`[data-btn="${i}"]`); b.textContent='Start'; b.className='go';
  }
  recalc();
});

document.getElementById('export').addEventListener('click', ()=>{
  const rowsCsv=[];
  // rows with any data
  for(let i=0;i<ROWS;i++){
    const s=state[i];
    const hasTime = !s.running && s.ms!=null;
    if(hasTime || s.count>0 || s.ron>0 || s.jun>0){
      rowsCsv.push([i+1, hasTime?fmt(s.ms):'', hasTime?(s.ms/1000).toFixed(2):'', s.count, s.ron, s.jun]);
    }
  }
  // stats block
  const times=[]; for(let i=0;i<ROWS;i++){ if(!state[i].running && state[i].ms!=null) times.push({ms:state[i].ms,n:i+1}); }
  const counts=[]; for(let i=0;i<ROWS;i++){ const s=state[i]; if((!s.running&&s.ms!=null)||s.count>0) counts.push({c:s.count,n:i+1}); }

  const lines=[];
  lines.push('項目,値,補足');
  if(times.length){
    const sum=times.reduce((a,b)=>a+b.ms,0);
    const mx=times.reduce((a,b)=>b.ms>a.ms?b:a), mn=times.reduce((a,b)=>b.ms<a.ms?b:a);
    lines.push(`平均時間,${fmt(sum/times.length)},計測済${times.length}件`);
    lines.push(`最長時間,${fmt(mx.ms)},${mx.n}回目`);
    lines.push(`最短時間,${fmt(mn.ms)},${mn.n}回目`);
  }
  if(counts.length){
    const sum=counts.reduce((a,b)=>a+b.c,0);
    const mx=counts.reduce((a,b)=>b.c>a.c?b:a), mn=counts.reduce((a,b)=>b.c<a.c?b:a);
    lines.push(`チャンチャレ平均,${(sum/counts.length).toFixed(2)},${counts.length}件`);
    lines.push(`最多回数,${mx.c},${mx.n}回目`);
    lines.push(`最小回数,${mn.c},${mn.n}回目`);
  }
  const ronCnt=state.reduce((a,s)=>a+s.ron,0);
  const junCnt=state.reduce((a,s)=>a+s.jun,0);
  lines.push(`ロンコネ合計,${ronCnt},合計回数`);
  lines.push(`ジュニオール合計,${junCnt},合計回数`);
  lines.push('');
  lines.push('回,時間,秒,チャンチャレ回数,ロンコネ,ジュニオール');
  rowsCsv.forEach(r=>lines.push(r.join(',')));

  const csv='\uFEFF'+lines.join('\r\n'); // BOM for Excel(日本語)
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const ts=new Date();
  const pad=n=>String(n).padStart(2,'0');
  a.href=url;
  a.download=`lap_${ts.getFullYear()}${pad(ts.getMonth()+1)}${pad(ts.getDate())}_${pad(ts.getHours())}${pad(ts.getMinutes())}.csv`;
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('lap-mode').addEventListener('change', e=>{ lapMode=e.target.checked; });

// JSON export
document.getElementById('json-export').addEventListener('click', ()=>{
  const data={
    version:1,
    exportedAt:new Date().toISOString(),
    rows:state.map((s,i)=>({n:i+1, ms:(!s.running && s.ms!=null)?s.ms:null, count:s.count, ron:s.ron, jun:s.jun}))
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const ts=new Date(), pad=n=>String(n).padStart(2,'0');
  a.href=url;
  a.download=`lap_${ts.getFullYear()}${pad(ts.getMonth()+1)}${pad(ts.getDate())}_${pad(ts.getHours())}${pad(ts.getMinutes())}.json`;
  a.click(); URL.revokeObjectURL(url);
});

// JSON import
document.getElementById('json-import').addEventListener('click', ()=>{
  document.getElementById('json-file').click();
});
document.getElementById('json-file').addEventListener('change', e=>{
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const data=JSON.parse(reader.result);
      if(!data || !Array.isArray(data.rows)) throw new Error('形式が不正です');
      if(!confirm('読み込むと現在の内容は上書きされます。続行しますか？')){ e.target.value=''; return; }
      clearInterval(ticking); ticking=null;
      for(let i=0;i<ROWS;i++){ state[i].running=false; state[i].startAt=null; }
      for(let i=0;i<ROWS;i++){ state[i].ms=null; state[i].count=0; state[i].ron=0; state[i].jun=0; }
      data.rows.forEach(r=>{
        const i=(r.n|0)-1;
        if(i<0||i>=ROWS) return;
        state[i].ms = (typeof r.ms==='number')?r.ms:null;
        state[i].count = Math.max(0, r.count|0);
        state[i].ron = Math.max(0, r.ron|0);
        state[i].jun = Math.max(0, r.jun|0);
      });
      for(let i=0;i<ROWS;i++){
        const row=rows.querySelector(`.row[data-i="${i}"]`);
        row.classList.remove('running');
        const inp=row.querySelector(`[data-t="${i}"]`);
        inp.readOnly=false; inp.value=fmt(state[i].ms);
        row.querySelector(`[data-c="${i}"]`).value=state[i].count;
        row.querySelector(`[data-ron="${i}"]`).value=state[i].ron;
        row.querySelector(`[data-jun="${i}"]`).value=state[i].jun;
        const b=row.querySelector(`[data-btn="${i}"]`); b.textContent='Start'; b.className='go';
      }
      recalc();
    }catch(err){
      alert('読み込みに失敗しました: '+err.message);
    }
    e.target.value='';
  };
  reader.readAsText(file);
});

recalc();
</script>
</body>
</html>
